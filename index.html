<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>직원 타임수 종합 관리판 (Firebase 연동)</title>
    
    <!-- Firebase SDK (compat 버전) 추가 -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

    <style>
        * { box-sizing: border-box; font-family: 'Pretendard', 'Malgun Gothic', sans-serif; }
        body { background-color: #f4f6f9; margin: 0; padding: 15px 10px; display: flex; flex-direction: column; align-items: center; }
        .container { background: white; padding: 20px 15px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); width: 100%; max-width: 1100px; }
        
        /* 잠금 화면 (인증 전) */
        .lock-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
            text-align: center;
        }
        .lock-card {
            background: #ffffff;
            border: 2px solid #e2e8f0;
            padding: 30px 25px;
            border-radius: 16px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.06);
            max-width: 380px;
            width: 100%;
        }
        .lock-icon { font-size: 48px; margin-bottom: 15px; }
        .lock-title { font-size: 20px; font-weight: bold; color: #2d3748; margin-bottom: 8px; }
        .lock-desc { font-size: 13px; color: #718096; margin-bottom: 20px; line-height: 1.4; }
        .lock-btn-group { display: flex; flex-direction: column; gap: 10px; width: 100%; }

        /* 상단 헤더 */
        .header-bar { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #edf2f7; padding-bottom: 12px; margin-bottom: 15px; }
        .header-bar h1 { margin: 0; font-size: 20px; color: #1a202c; }
        .admin-controls { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .admin-badge { padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; background-color: #3182ce; color: white; }
        .admin-badge.admin-mode { background-color: #e53e3e; color: white; }
        .btn { padding: 8px 14px; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; font-size: 13px; transition: 0.2s; white-space: nowrap; }
        .btn-primary { background-color: #3182ce; color: white; }
        .btn-danger { background-color: #e53e3e; color: white; }
        .btn-gray { background-color: #718096; color: white; }

        /* 관리자 전용 바로 입력 상자 */
        .quick-input-box { display: none; background: #eef6ff; border: 2px solid #3182ce; padding: 15px; border-radius: 10px; margin-bottom: 20px; }
        .quick-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; flex-wrap: wrap; gap: 8px; }
        .quick-header h3 { margin: 0; font-size: 15px; color: #2b6cb0; }
        .pw-change-group { display: flex; gap: 6px; }
        .btn-pw-change { background: #718096; color: white; border: none; padding: 6px 10px; border-radius: 4px; font-size: 11px; cursor: pointer; }

        .form-grid { display: grid; grid-template-columns: 1.2fr 1.5fr 1fr 1fr; gap: 8px; }
        .form-grid input { padding: 10px; border: 1px solid #cbd5e0; border-radius: 6px; font-size: 14px; width: 100%; height: 44px; }
        .btn-save-main { background: #38a169; color: white; border: none; border-radius: 6px; font-weight: bold; font-size: 15px; cursor: pointer; height: 44px; }

        /* 모바일 커스텀 추천 검색 박스 */
        .name-input-container { position: relative; width: 100%; }
        .custom-suggestions-box { 
            display: none; 
            position: absolute; 
            top: 48px; 
            left: 0; 
            right: 0; 
            background: white; 
            border: 2px solid #3182ce; 
            border-radius: 8px; 
            max-height: 180px; 
            overflow-y: auto; 
            z-index: 1001; 
            box-shadow: 0 6px 16px rgba(0,0,0,0.15); 
        }
        .suggestion-item { padding: 12px; font-size: 14px; cursor: pointer; border-bottom: 1px solid #edf2f7; color: #2d3748; font-weight: 500; }
        .suggestion-item:last-child { border-bottom: none; }
        .suggestion-item:active { background-color: #ebf8ff; color: #2b6cb0; font-weight: bold; }

        /* 월 선택 */
        .month-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .month-nav h2 { margin: 0; font-size: 20px; color: #2d3748; }
        .month-nav button { background: white; border: 1px solid #cbd5e0; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-weight: bold; height: 38px; }

        /* 모바일 스크롤 달력 */
        .calendar-scroll-container { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; border-radius: 8px; padding-bottom: 8px; }
        .calendar-inner { min-width: 600px; }

        /* 달력 헤더 및 색상 */
        .days-header { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; font-weight: bold; margin-bottom: 8px; color: #4a5568; font-size: 14px; }
        .sun { color: #e53e3e !important; }
        .sat { color: #3182ce !important; }
        
        .dates-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
        .date-cell { border: 1px solid #e2e8f0; min-height: 105px; max-height: 125px; padding: 6px; border-radius: 8px; background: #fff; cursor: pointer; display: flex; flex-direction: column; overflow: hidden; transition: 0.15s; }
        .date-cell:hover { border-color: #3182ce; background-color: #f7fafc; }
        .date-cell.empty { background: transparent; border: none; cursor: default; }

        /* 날짜 숫자 & 공휴일 라벨 스타일 */
        .date-num { font-size: 13px; font-weight: bold; color: #2d3748; margin-bottom: 4px; display: flex; justify-content: space-between; align-items: center; }
        .holiday-tag { font-size: 10px; color: #e53e3e; font-weight: normal; max-width: 65px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .time-tags { flex: 1; display: flex; flex-direction: column; gap: 3px; overflow: hidden; }
        .tag { background: #ebf8ff; color: #2b6cb0; padding: 2px 4px; border-radius: 4px; font-size: 11px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .more-badge { background: #3182ce; color: white; padding: 3px 5px; border-radius: 4px; font-size: 10px; font-weight: bold; text-align: center; margin-top: 2px; }

        /* 하단 직원별 월 합계 표 */
        .summary-section { margin-top: 25px; border-top: 2px solid #edf2f7; padding-top: 15px; }
        .summary-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; flex-wrap: wrap; gap: 10px; }
        .summary-header h3 { margin: 0; font-size: 17px; color: #2d3748; }
        .summary-tools { display: flex; align-items: center; gap: 10px; width: 100%; max-width: 300px; }
        .search-input { padding: 10px 12px; border: 2px solid #3182ce; border-radius: 6px; font-size: 14px; outline: none; width: 100%; height: 42px; }

        .summary-table-wrapper { width: 100%; overflow-x: auto; }
        .summary-table { width: 100%; border-collapse: collapse; text-align: left; }
        .summary-table th, .summary-table td { padding: 10px; border-bottom: 1px solid #e2e8f0; font-size: 13px; }
        .summary-table th { background-color: #f7fafc; color: #4a5568; font-weight: bold; }
        .summary-table tbody tr:hover { background-color: #ebf8ff; }
        .total-val { color: #3182ce; font-weight: bold; font-size: 14px; }

        /* 일별 상세 내역 모달 */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; padding: 15px; }
        .modal-overlay.active { display: flex; }
        .modal-content { background: white; width: 100%; max-width: 480px; max-height: 85vh; border-radius: 12px; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .modal-header { padding: 15px 18px; background: #3182ce; color: white; display: flex; justify-content: space-between; align-items: center; }
        .modal-header h3 { margin: 0; font-size: 16px; }
        .modal-close { font-size: 22px; cursor: pointer; font-weight: bold; line-height: 1; }
        .modal-body { padding: 15px; overflow-y: auto; flex: 1; display: flex; flex-direction: column; gap: 10px; }
        .modal-summary-badge { background: #ebf8ff; color: #2b6cb0; padding: 10px; border-radius: 6px; font-weight: bold; font-size: 14px; text-align: center; border: 1px solid #bee3f8; }
        .modal-list { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 6px; }
        .modal-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 12px; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 6px; font-size: 14px; }
        .modal-item-name { font-weight: bold; color: #2d3748; }
        .modal-item-val { color: #3182ce; font-weight: bold; }
        .btn-del-item { color: #e53e3e; background: #fff5f5; border: 1px solid #fed7d7; padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: bold; margin-left: 10px; }

        @media (max-width: 768px) {
            .header-bar { flex-direction: column; align-items: flex-start; gap: 10px; }
            .admin-controls { width: 100%; justify-content: space-between; }
            .form-grid { grid-template-columns: 1fr; }
            .summary-tools { max-width: 100%; }
        }
    </style>
</head>
<body>

<div class="container">

    <!-- 🔒 잠금 화면 (비밀번호 입력 전) -->
    <div id="lock-screen" class="lock-screen">
        <div class="lock-card">
            <div class="lock-icon">🔒</div>
            <div class="lock-title">보안 접근 인증</div>
            <div class="lock-desc">내용을 확인하시려면 직원 또는 관리자 비밀번호를 입력하여 입장하세요.</div>
            <div class="lock-btn-group">
                <button class="btn btn-primary" style="padding:12px;" onclick="loginAsStaff()">👤 직원 로그인 (조회 전용)</button>
                <button class="btn btn-danger" style="padding:12px;" onclick="loginAsAdmin()">🔑 관리자 로그인 (수정 가능)</button>
            </div>
        </div>
    </div>

    <!-- 🗓️ 본문 메인 화면 (인증 후 표시) -->
    <div id="main-content" style="display: none;">
        <div class="header-bar">
            <h1>🗓️ 직원 타임수 현황판</h1>
            <div class="admin-controls">
                <span id="admin-badge" class="admin-badge">직원 (조회 전용)</span>
                <button id="auth-btn" class="btn btn-danger" onclick="toggleAdmin()">관리자 전환</button>
                <button class="btn btn-gray" onclick="logout()">로그아웃</button>
            </div>
        </div>

        <!-- 관리자 전용 바로 입력 상자 -->
        <div id="quick-input-box" class="quick-input-box">
            <div class="quick-header">
                <h3>✏️ 관리자 타임수 바로 입력</h3>
                <div class="pw-change-group">
                    <button class="btn-pw-change" onclick="changeStaffPassword()">🔑 직원 비번 변경</button>
                    <button class="btn-pw-change" onclick="changeAdminPassword()">🔑 관리자 비번 변경</button>
                </div>
            </div>
            <div class="form-grid">
                <input type="date" id="input-date">
                
                <div class="name-input-container">
                    <input type="text" id="input-name" placeholder="직원 이름 (예: 홍길동)" 
                           autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
                           oninput="showNameSuggestions()" onfocus="showNameSuggestions()">
                    <div id="name-suggestions-box" class="custom-suggestions-box"></div>
                </div>

                <input type="number" id="input-time" placeholder="타임수 (예: 5)" step="0.5">
                <button class="btn-save-main" onclick="addTimeDataQuick()">입력 / 수정 저장</button>
            </div>
        </div>

        <div class="month-nav">
            <button onclick="changeMonth(-1)">&lt; 이전달</button>
            <h2 id="month-display">2026년 07월</h2>
            <button onclick="changeMonth(1)">다음달 &gt;</button>
        </div>

        <div class="calendar-scroll-container">
            <div class="calendar-inner">
                <div class="days-header">
                    <div class="sun">일</div><div>월</div><div>화</div><div>수</div><div>목</div><div>금</div><div class="sat">토</div>
                </div>
                <div id="dates-grid" class="dates-grid"></div>
            </div>
        </div>

        <!-- 하단 직원별 월 합계 영역 -->
        <div class="summary-section">
            <div class="summary-header">
                <h3>📊 직원 개인별 월 합계 조회</h3>
                <div class="summary-tools">
                    <div class="name-input-container">
                        <input type="text" id="summary-search" class="search-input" 
                               placeholder="🔍 직원 이름 입력..."
                               autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
                               oninput="handleSummarySearchInput()" onfocus="showSummarySuggestions()">
                        <div id="summary-suggestions-box" class="custom-suggestions-box"></div>
                    </div>
                </div>
            </div>
            <div class="summary-table-wrapper">
                <table class="summary-table">
                    <thead>
                        <tr>
                            <th style="width: 20%;">순번</th>
                            <th style="width: 45%;">직원 이름</th>
                            <th style="width: 35%;">이번 달 누적 타임수</th>
                        </tr>
                    </thead>
                    <tbody id="summary-tbody"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- 일별 상세 내역 팝업 모달 -->
<div id="date-modal" class="modal-overlay" onclick="closeDateModal(event)">
    <div class="modal-content" onclick="event.stopPropagation()">
        <div class="modal-header">
            <h3 id="modal-date-title">📅 0000년 00월 00일 내역</h3>
            <span class="modal-close" onclick="closeDateModal()">✕</span>
        </div>
        <div class="modal-body">
            <div id="modal-summary-badge" class="modal-summary-badge">총 0명 / 0 타임</div>
            
            <div class="name-input-container">
                <input type="text" id="modal-search" class="search-input" 
                       placeholder="🔍 이 날짜의 직원 이름 검색..."
                       autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
                       oninput="handleModalSearchInput()" onfocus="showModalSuggestions()">
                <div id="modal-suggestions-box" class="custom-suggestions-box"></div>
            </div>

            <ul id="modal-list" class="modal-list"></ul>
        </div>
    </div>
</div>

<script>
    // -------------------------------------------------------------
    // 🔥 파이어베이스 설정 정보
    // -------------------------------------------------------------
    const firebaseConfig = {
      apiKey: "AIzaSyDfVycUkONZs-RCBHqwzFweS-5avrWUhVc",
      authDomain: "park-management-2055a.firebaseapp.com",
      projectId: "park-management-2055a",
      storageBucket: "park-management-2055a.firebasestorage.app",
      messagingSenderId: "1014430922351",
      appId: "1:1014430922351:web:8514885df6e2c2c9bf3f9a",
      measurementId: "G-W0H7EV2L1L"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // -------------------------------------------------------------
    // 🇰🇷 대한민국 공휴일 데이터베이스
    // -------------------------------------------------------------
    const holidays = {
        fixed: {
            "01-01": "신정",
            "03-01": "삼일절",
            "05-05": "어린이날",
            "06-06": "현충일",
            "08-15": "광복절",
            "10-03": "개천절",
            "10-09": "한글날",
            "12-25": "성탄절"
        },
        specific: {
            "2025-01-28": "설날 연휴", "2025-01-29": "설날", "2025-01-30": "설날 연휴",
            "2025-03-03": "대체공휴일", "2025-05-06": "대체공휴일",
            "2025-10-05": "추석 연휴", "2025-10-06": "추석", "2025-10-07": "추석 연휴", "2025-10-08": "대체공휴일",
            
            "2026-02-16": "설날 연휴", "2026-02-17": "설날", "2026-02-18": "설날 연휴",
            "2026-03-02": "대체공휴일", "2026-05-24": "부처님오신날", "2026-05-25": "대체공휴일",
            "2026-08-17": "대체공휴일", "2026-09-24": "추석 연휴", "2026-09-25": "추석", "2026-09-26": "추석 연휴",
            "2026-10-05": "대체공휴일",

            "2027-02-06": "설날 연휴", "2027-02-07": "설날", "2027-02-08": "설날 연휴", "2027-02-09": "대체공휴일",
            "2027-05-13": "부처님오신날", "2027-09-14": "추석 연휴", "2027-09-15": "추석", "2027-09-16": "추석 연휴",
            "2027-10-04": "대체공휴일", "2027-10-11": "대체공휴일"
        }
    };

    function getHolidayName(dateKey) {
        const mmdd = dateKey.substring(5);
        if (holidays.specific[dateKey]) return holidays.specific[dateKey];
        if (holidays.fixed[mmdd]) return holidays.fixed[mmdd];
        return null;
    }

    // -------------------------------------------------------------
    // 변수 및 데이터 선언
    // -------------------------------------------------------------
    let currentDate = new Date();
    let isAuthenticated = false; // 로그인 완료 여부
    let isAdmin = false;          // 관리자 권한 여부
    let selectedDateKey = null;

    // 🔥 파이어베이스 동기화용 비밀번호 변수 (초기 기본값)
    let staffPassword = '0000';
    let adminPassword = '1234';
    
    let timesData = {};
    let savedEmployeeList = [];

    const todayStr = currentDate.toISOString().split('T')[0];
    document.getElementById('input-date').value = todayStr;

    // 🔥 Firestore 데이터 및 비밀번호 실시간 동기화
    function initFirestoreListener() {
        // 타임수 데이터
        db.collection("employee_management").doc("times_data")
          .onSnapshot((doc) => {
              if (doc.exists) {
                  timesData = doc.data().data || {};
              } else {
                  timesData = {};
              }
              if (isAuthenticated) renderCalendar();
              if (selectedDateKey) renderModalList();
          });

        // 직원 이름 목록
        db.collection("employee_management").doc("employee_list")
          .onSnapshot((doc) => {
              if (doc.exists) {
                  savedEmployeeList = doc.data().list || [];
              } else {
                  savedEmployeeList = [];
              }
          });

        // 🔥 모든 기기 비밀번호 서버 실시간 동기화
        db.collection("employee_management").doc("app_settings")
          .onSnapshot((doc) => {
              if (doc.exists) {
                  const settings = doc.data();
                  if (settings.staffPw) staffPassword = settings.staffPw;
                  if (settings.adminPw) adminPassword = settings.adminPw;
              } else {
                  // 최초 실행 시 서버에 기본 비밀번호 세팅
                  db.collection("employee_management").doc("app_settings").set({
                      staffPw: '0000',
                      adminPw: '1234'
                  });
              }
          });
    }

    function saveData() {
        db.collection("employee_management").doc("times_data").set({ data: timesData });
        db.collection("employee_management").doc("employee_list").set({ list: savedEmployeeList });
    }

    /* 🔐 인증 로직 */
    function loginAsStaff() {
        const inputPw = prompt("직원 조회용 비밀번호를 입력하세요:");
        if (inputPw === staffPassword) {
            isAuthenticated = true;
            isAdmin = false;
            showMainScreen();
        } else if (inputPw !== null) {
            alert("비밀번호가 틀렸습니다.");
        }
    }

    function loginAsAdmin() {
        const inputPw = prompt("관리자 비밀번호를 입력하세요:");
        if (inputPw === adminPassword) {
            isAuthenticated = true;
            isAdmin = true;
            showMainScreen();
        } else if (inputPw !== null) {
            alert("비밀번호가 틀렸습니다.");
        }
    }

    function toggleAdmin() {
        if (!isAdmin) {
            const password = prompt("관리자 비밀번호를 입력하세요:");
            if (password === adminPassword) {
                isAdmin = true;
                updateUIState();
            } else if (password !== null) {
                alert("비밀번호가 올바르지 않습니다.");
            }
        } else {
            isAdmin = false;
            updateUIState();
        }
    }

    function logout() {
        isAuthenticated = false;
        isAdmin = false;
        document.getElementById('main-content').style.display = 'none';
        document.getElementById('lock-screen').style.display = 'flex';
    }

    function showMainScreen() {
        document.getElementById('lock-screen').style.display = 'none';
        document.getElementById('main-content').style.display = 'block';
        updateUIState();
        renderCalendar();
    }

    function updateUIState() {
        const badge = document.getElementById('admin-badge');
        const authBtn = document.getElementById('auth-btn');
        const quickInputBox = document.getElementById('quick-input-box');

        if (isAdmin) {
            badge.textContent = "관리자 (수정 가능)";
            badge.classList.add('admin-mode');
            authBtn.textContent = "직원모드 전환";
            authBtn.className = "btn btn-primary";
            quickInputBox.style.display = 'block';
        } else {
            badge.textContent = "직원 (조회 전용)";
            badge.classList.remove('admin-mode');
            authBtn.textContent = "관리자 전환";
            authBtn.className = "btn btn-danger";
            quickInputBox.style.display = 'none';
        }
        renderCalendar();
        if (selectedDateKey) renderModalList();
    }

    // 🔥 서버에 직원 비밀번호 실시간 업데이트
    function changeStaffPassword() {
        if (!isAdmin) return;
        const newPw = prompt("새로운 직원용 비밀번호를 입력하세요:");
        if (newPw && newPw.trim() !== "") {
            const trimmedPw = newPw.trim();
            db.collection("employee_management").doc("app_settings").update({
                staffPw: trimmedPw
            }).then(() => {
                alert("직원용 비밀번호가 모든 기기에 변경 적용되었습니다.");
            });
        }
    }

    // 🔥 서버에 관리자 비밀번호 실시간 업데이트
    function changeAdminPassword() {
        if (!isAdmin) return;
        const newPw = prompt("새로운 관리자용 비밀번호를 입력하세요:");
        if (newPw && newPw.trim() !== "") {
            const trimmedPw = newPw.trim();
            db.collection("employee_management").doc("app_settings").update({
                adminPw: trimmedPw
            }).then(() => {
                alert("관리자용 비밀번호가 모든 기기에 변경 적용되었습니다.");
            });
        }
    }

    function changeMonth(delta) {
        currentDate.setMonth(currentDate.getMonth() + delta);
        renderCalendar();
    }

    /* 추천 검색 관련 함수들 */
    function showNameSuggestions() {
        const inputVal = document.getElementById('input-name').value.trim().toLowerCase();
        const box = document.getElementById('name-suggestions-box');
        box.innerHTML = '';

        if (savedEmployeeList.length === 0 || !inputVal) {
            box.style.display = 'none';
            return;
        }

        const matches = savedEmployeeList.filter(name => name.toLowerCase().includes(inputVal));
        if (matches.length === 0) { box.style.display = 'none'; return; }

        matches.forEach(name => {
            const item = document.createElement('div');
            item.className = 'suggestion-item';
            item.textContent = name;
            item.onmousedown = (e) => {
                e.preventDefault();
                selectNameSuggestion(name);
            };
            box.appendChild(item);
        });

        box.style.display = 'block';
    }

    function selectNameSuggestion(name) {
        document.getElementById('input-name').value = name;
        document.getElementById('name-suggestions-box').style.display = 'none';
        document.getElementById('input-time').focus();
    }

    function handleSummarySearchInput() {
        showSummarySuggestions();
        renderMonthlySummaryCurrent();
    }

    function showSummarySuggestions() {
        const inputVal = document.getElementById('summary-search').value.trim().toLowerCase();
        const box = document.getElementById('summary-suggestions-box');
        box.innerHTML = '';

        if (savedEmployeeList.length === 0 || !inputVal) {
            box.style.display = 'none';
            return;
        }

        const matches = savedEmployeeList.filter(name => name.toLowerCase().includes(inputVal));
        if (matches.length === 0) { box.style.display = 'none'; return; }

        matches.forEach(name => {
            const item = document.createElement('div');
            item.className = 'suggestion-item';
            item.textContent = name;
            item.onmousedown = (e) => {
                e.preventDefault();
                selectSummaryNameSuggestion(name);
            };
            box.appendChild(item);
        });

        box.style.display = 'block';
    }

    function selectSummaryNameSuggestion(name) {
        document.getElementById('summary-search').value = name;
        document.getElementById('summary-suggestions-box').style.display = 'none';
        renderMonthlySummaryCurrent();
    }

    function handleModalSearchInput() {
        showModalSuggestions();
        renderModalList();
    }

    function showModalSuggestions() {
        if (!selectedDateKey) return;
        const dayData = timesData[selectedDateKey] || {};
        const empNames = Object.keys(dayData);

        const inputVal = document.getElementById('modal-search').value.trim().toLowerCase();
        const box = document.getElementById('modal-suggestions-box');
        box.innerHTML = '';

        if (empNames.length === 0 || !inputVal) {
            box.style.display = 'none';
            return;
        }

        const matches = empNames.filter(name => name.toLowerCase().includes(inputVal));
        if (matches.length === 0) { box.style.display = 'none'; return; }

        matches.forEach(name => {
            const item = document.createElement('div');
            item.className = 'suggestion-item';
            item.textContent = name;
            item.onmousedown = (e) => {
                e.preventDefault();
                selectModalNameSuggestion(name);
            };
            box.appendChild(item);
        });

        box.style.display = 'block';
    }

    function selectModalNameSuggestion(name) {
        document.getElementById('modal-search').value = name;
        document.getElementById('modal-suggestions-box').style.display = 'none';
        renderModalList();
    }

    document.addEventListener('click', function(e) {
        document.querySelectorAll('.name-input-container').forEach(container => {
            if (!container.contains(e.target)) {
                const box = container.querySelector('.custom-suggestions-box');
                if (box) box.style.display = 'none';
            }
        });
    });

    function addTimeDataQuick() {
        const dateInput = document.getElementById('input-date').value;
        const nameInput = document.getElementById('input-name').value.trim();
        const timeVal = parseFloat(document.getElementById('input-time').value);

        if (!dateInput) { alert('날짜를 선택해 주세요.'); return; }
        if (!nameInput) { alert('직원 이름을 입력해 주세요.'); return; }
        if (isNaN(timeVal)) { alert('타임수를 숫자로 입력해 주세요.'); return; }

        if (!timesData[dateInput]) timesData[dateInput] = {};
        timesData[dateInput][nameInput] = timeVal;

        if (!savedEmployeeList.includes(nameInput)) savedEmployeeList.push(nameInput);

        saveData();

        document.getElementById('input-name').value = '';
        document.getElementById('input-time').value = '';
        document.getElementById('name-suggestions-box').style.display = 'none';

        const [y, m] = dateInput.split('-');
        currentDate.setFullYear(parseInt(y));
        currentDate.setMonth(parseInt(m) - 1);
    }

    function deleteTime(dateKey, empName) {
        if (!isAdmin) return;
        if (confirm(`[${dateKey}] ${empName} 님의 내역을 삭제하시겠습니까?`)) {
            delete timesData[dateKey][empName];
            saveData();
        }
    }

    function renderCalendar() {
        const year = currentDate.getFullYear();
        const month = currentDate.getMonth() + 1;
        const monthPadded = String(month).padStart(2, '0');

        document.getElementById('month-display').textContent = `${year}년 ${monthPadded}월`;

        const datesGrid = document.getElementById('dates-grid');
        datesGrid.innerHTML = '';

        const firstDayIndex = new Date(year, month - 1, 1).getDay();
        const lastDayDate = new Date(year, month, 0).getDate();

        for (let i = 0; i < firstDayIndex; i++) {
            datesGrid.innerHTML += `<div class="date-cell empty"></div>`;
        }

        for (let day = 1; day <= lastDayDate; day++) {
            const dateCell = document.createElement('div');
            dateCell.className = 'date-cell';

            const dayPadded = String(day).padStart(2, '0');
            const dateKey = `${year}-${monthPadded}-${dayPadded}`;
            
            const cellDate = new Date(year, month - 1, day);
            const dayOfWeek = cellDate.getDay();
            const holidayName = getHolidayName(dateKey);

            let colorClass = '';
            if (dayOfWeek === 0 || holidayName) {
                colorClass = 'sun';
            } else if (dayOfWeek === 6) {
                colorClass = 'sat';
            }

            const holidayHtml = holidayName ? `<span class="holiday-tag">${holidayName}</span>` : '';

            const dayData = timesData[dateKey] || {};
            const empNames = Object.keys(dayData);
            const totalEmps = empNames.length;

            let tagsHtml = '<div class="time-tags">';
            if (totalEmps > 0) {
                const displayNames = empNames.slice(0, 2);
                displayNames.forEach(empName => {
                    tagsHtml += `<span class="tag">${empName}: ${dayData[empName]}</span>`;
                });

                if (totalEmps > 2) {
                    tagsHtml += `<div class="more-badge">👥 +${totalEmps - 2}명 더보기</div>`;
                }
            }
            tagsHtml += '</div>';

            dateCell.innerHTML = `
                <div class="date-num ${colorClass}">
                    <span>${day}</span>
                    ${holidayHtml}
                </div>
                ${tagsHtml}
            `;
            dateCell.onclick = () => openDateModal(dateKey);

            datesGrid.appendChild(dateCell);
        }

        renderMonthlySummary(year, monthPadded);
    }

    function openDateModal(dateKey) {
        selectedDateKey = dateKey;
        document.getElementById('input-date').value = dateKey;
        
        const [y, m, d] = dateKey.split('-');
        document.getElementById('modal-date-title').textContent = `📅 ${y}년 ${m}월 ${d}일 상세 내역`;
        document.getElementById('modal-search').value = '';
        
        const modalBox = document.getElementById('modal-suggestions-box');
        if (modalBox) modalBox.style.display = 'none';

        renderModalList();
        document.getElementById('date-modal').classList.add('active');
    }

    function closeDateModal(event) {
        if (!event || event.target.id === 'date-modal' || event.target.classList.contains('modal-close')) {
            document.getElementById('date-modal').classList.remove('active');
            selectedDateKey = null;
            const modalBox = document.getElementById('modal-suggestions-box');
            if (modalBox) modalBox.style.display = 'none';
        }
    }

    function renderModalList() {
        if (!selectedDateKey) return;

        const dayData = timesData[selectedDateKey] || {};
        const empNames = Object.keys(dayData);
        const searchKeyword = document.getElementById('modal-search').value.trim().toLowerCase();

        let totalTimeSum = 0;
        empNames.forEach(name => totalTimeSum += (parseFloat(dayData[name]) || 0));

        document.getElementById('modal-summary-badge').textContent = `총 ${empNames.length}명 등록됨 (총 ${totalTimeSum} 타임)`;

        const modalList = document.getElementById('modal-list');
        modalList.innerHTML = '';

        let filteredNames = empNames.filter(name => name.toLowerCase().includes(searchKeyword));

        const exactMatch = filteredNames.find(name => name.toLowerCase() === searchKeyword);
        if (exactMatch) {
            filteredNames = [exactMatch];
        }

        if (filteredNames.length === 0) {
            modalList.innerHTML = '<li style="text-align:center; color:#a0aec0; padding:20px;">등록된 직원 내역이 없습니다.</li>';
            return;
        }

        filteredNames.forEach(empName => {
            const li = document.createElement('li');
            li.className = 'modal-item';
            
            const delBtnHtml = isAdmin ? `<button class="btn-del-item" onclick="deleteTime('${selectedDateKey}', '${empName}')">삭제</button>` : '';

            li.innerHTML = `
                <div style="cursor:pointer; flex:1;" onclick="selectModalNameSuggestion('${empName}')">
                    <span class="modal-item-name">${empName}</span>
                </div>
                <div>
                    <span class="modal-item-val">${dayData[empName]}</span> 타임
                    ${delBtnHtml}
                </div>
            `;
            modalList.appendChild(li);
        });
    }

    function renderMonthlySummaryCurrent() {
        const year = currentDate.getFullYear();
        const monthPadded = String(currentDate.getMonth() + 1).padStart(2, '0');
        renderMonthlySummary(year, monthPadded);
    }

    function renderMonthlySummary(year, monthPadded) {
        const prefix = `${year}-${monthPadded}`;
        const empTotals = {};
        const searchKeyword = (document.getElementById('summary-search')?.value || '').trim().toLowerCase();

        Object.keys(timesData).forEach(dateKey => {
            if (dateKey.startsWith(prefix)) {
                const dayData = timesData[dateKey];
                Object.keys(dayData).forEach(empName => {
                    const val = parseFloat(dayData[empName]) || 0;
                    empTotals[empName] = (empTotals[empName] || 0) + val;
                });
            }
        });

        const tbody = document.getElementById('summary-tbody');
        tbody.innerHTML = '';

        if (searchKeyword === "") {
            tbody.innerHTML = '<tr><td colspan="3" style="text-align:center; color:#a0aec0; padding:20px;">🔍 직원 이름을 입력하시면 누적 타임수가 표시됩니다.</td></tr>';
            return;
        }

        let filteredEmployees = Object.keys(empTotals)
            .filter(empName => empName.toLowerCase().includes(searchKeyword));

        const exactMatch = filteredEmployees.find(empName => empName.toLowerCase() === searchKeyword);
        if (exactMatch) {
            filteredEmployees = [exactMatch];
        }

        const sortedEmployees = filteredEmployees.sort((a, b) => empTotals[b] - empTotals[a]);

        if (sortedEmployees.length === 0) {
            tbody.innerHTML = '<tr><td colspan="3" style="text-align:center; color:#e53e3e; padding:15px;">검색하신 직원 이름을 찾을 수 없거나 내역이 없습니다.</td></tr>';
        } else {
            sortedEmployees.forEach((empName, idx) => {
                const tr = document.createElement('tr');
                tr.style.cursor = 'pointer';
                tr.onclick = () => selectSummaryNameSuggestion(empName);
                tr.innerHTML = `
                    <td>${idx + 1}</td>
                    <td><b>${empName}</b></td>
                    <td><span class="total-val">${empTotals[empName]}</span> 타임</td>
                `;
                tbody.appendChild(tr);
            });
        }
    }

    // Firestore 실시간 구독 실행
    initFirestoreListener();
</script>
